services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anpr}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ${COMPOSE_ENV_FILE:-./.env}
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-anpr}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      APP_ENV: ${APP_ENV:-development}
      AUTO_CREATE_SCHEMA: ${AUTO_CREATE_SCHEMA:-true}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: ${BACKEND_PORT:-8010}
    depends_on:
      - postgres
    ports:
      - "${BACKEND_PORT:-8010}:${BACKEND_PORT:-8010}"
    volumes:
      - media_data:/app/media

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8010/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - media_data:/app/media:ro

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object store (dev / staging only)
  # Start with: docker compose --profile s3 up
  # Console: http://localhost:9001  (minioadmin / minioadmin)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    profiles:
      - s3

  # ---------------------------------------------------------------------------
  # Monitoring stack — Prometheus + Grafana
  # Start with: docker compose --profile monitoring up
  # Grafana: http://localhost:3100  (admin / admin by default)
  # Prometheus: http://localhost:9090
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - backend
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.3
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3100}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3100}:3000"
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # ---------------------------------------------------------------------------
  # Camera RTSP → HLS proxy — mediamtx (optional)
  # Start with: docker compose --profile streaming up
  # HLS stream: http://localhost:8888/camera/index.m3u8
  # Set CAMERA_RTSP_URL in .env to your camera RTSP URL.
  # Leave CAMERA_RTSP_URL=disabled (default) to skip this service.
  # ---------------------------------------------------------------------------
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    environment:
      MTX_PATHS_CAMERA_SOURCE: ${CAMERA_RTSP_URL:-disabled}
    ports:
      - "${MTX_RTSP_PORT:-8554}:8554"
      - "${MTX_HLS_PORT:-8888}:8888"
    profiles:
      - streaming

volumes:
  postgres_data:
  media_data:
  minio_data:
  prometheus_data:
  grafana_data:
