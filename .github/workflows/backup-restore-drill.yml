name: Backup Restore Drill

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  postgres-backup-restore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Start postgres service
        run: COMPOSE_ENV_FILE=./.env.ci docker compose --env-file .env.ci up -d postgres

      - name: Create postgres backup
        run: ./scripts/backup-postgres.sh

      - name: Restore latest backup
        run: |
          LATEST_BACKUP="$(ls -1t backups/postgres-*.dump | head -n1)"
          if [[ -z "${LATEST_BACKUP}" ]]; then
            echo "No backup file found"
            exit 1
          fi
          ./scripts/restore-postgres.sh "${LATEST_BACKUP}"

      - name: Verify database connectivity
        run: |
          POSTGRES_CONTAINER_ID="$(COMPOSE_ENV_FILE=./.env.ci docker compose --env-file .env.ci ps -q postgres)"
          docker exec "${POSTGRES_CONTAINER_ID}" pg_isready -U postgres

      - name: Upload latest backup artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: postgres-backup-latest
          path: backups/postgres-*.dump
          if-no-files-found: warn

      - name: Stop postgres service
        if: always()
        run: COMPOSE_ENV_FILE=./.env.ci docker compose --env-file .env.ci down -v
