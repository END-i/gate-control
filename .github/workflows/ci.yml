name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Run quality gate
        run: ./scripts/check-all.sh

  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run frontend e2e smoke tests
        working-directory: frontend
        run: pnpm run test:e2e

  security-sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install bandit pip-audit

      - name: Run Bandit (SAST)
        run: bandit -q -r backend -x backend/tests,backend/alembic

      - name: Run pip-audit
        run: |
          pip-audit -r backend/requirements.txt \
            --ignore-vuln GHSA-wp53-j4wj-2cfg \
            --ignore-vuln GHSA-mj87-hwqh-73pj \
            --ignore-vuln GHSA-mf9w-mj56-hr94

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Audit frontend dependencies
        working-directory: frontend
        run: pnpm audit --audit-level high

  dast-zap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Start stack
        run: COMPOSE_ENV_FILE=./.env.ci docker compose --env-file .env.ci up -d --build

      - name: Wait for frontend readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3000 >/dev/null; then
              exit 0
            fi
            echo "waiting for frontend..."
            sleep 2
          done
          echo "frontend did not become ready in time"
          exit 1

      - name: Run OWASP ZAP baseline scan
        run: |
          ZAP_OUT_DIR="${RUNNER_TEMP}/zap-out"
          mkdir -p "${ZAP_OUT_DIR}"
          CONTAINER_NAME="zap-baseline-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          FRONTEND_CONTAINER_ID="$(COMPOSE_ENV_FILE=./.env.ci docker compose --env-file .env.ci ps -q frontend)"

          docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1 || true

          if [[ -z "${FRONTEND_CONTAINER_ID}" ]]; then
            echo "Frontend container ID not found"
            exit 1
          fi

          set +e
          # Use :stable (not :weekly) — supports zap-baseline.py directly without
          # overriding the entrypoint.  Mount /zap/wrk so the script can write
          # file-based outputs; the report lands on the host via the bind-mount,
          # so no docker cp is needed.
          docker run --name "${CONTAINER_NAME}" \
            --user 0:0 \
            --network "container:${FRONTEND_CONTAINER_ID}" \
            -v "${ZAP_OUT_DIR}:/zap/wrk" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -I -t http://127.0.0.1:3000 -r zap-report.html
          ZAP_EXIT=$?
          set -e

          docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1 || true

          if [[ ! -f "${ZAP_OUT_DIR}/zap-report.html" ]]; then
            echo "ZAP report was not produced"
            exit 1
          fi

          if [[ "${ZAP_EXIT}" -ne 0 ]]; then
            echo "ZAP baseline exited with code ${ZAP_EXIT}"
            exit "${ZAP_EXIT}"
          fi

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: zap-report
          path: ${{ runner.temp }}/zap-out/zap-report.html
          if-no-files-found: warn

      - name: Stop stack
        if: always()
        run: COMPOSE_ENV_FILE=./.env.ci docker compose --env-file .env.ci down -v

  backup-validation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: anpr
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Apply Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/anpr
          SECRET_KEY: ci-secret
          RELAY_IP: http://relay.local
          RELAY_USERNAME: u
          RELAY_PASSWORD: p
          FRONTEND_URL: http://localhost:3000
          WEBHOOK_SHARED_SECRET: ci-webhook-secret
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin
        run: python -m alembic -c alembic.ini upgrade head

      - name: Install postgresql-client
        run: sudo apt-get update -qq && sudo apt-get install -y postgresql-client

      - name: Run backup validation
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: anpr
          POSTGRES_HOST: localhost
          PGPASSWORD: postgres
        run: ./scripts/validate-backup.sh

  migration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: anpr_migrate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Run migration tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/anpr_migrate_test
          SECRET_KEY: ci-secret
          RELAY_IP: http://relay.local
          RELAY_USERNAME: u
          RELAY_PASSWORD: p
          FRONTEND_URL: http://localhost:3000
          WEBHOOK_SHARED_SECRET: ci-webhook-secret
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin
          ANPR_SKIP_STARTUP_TASKS: "1"
        run: python -m pytest tests/test_migrations.py -v

  load-test-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install locust
        run: python -m pip install locust

      - name: Validate locustfile syntax
        run: python -c "import ast, sys; ast.parse(open('scripts/locustfile.py').read()); print('locustfile.py syntax OK')"
