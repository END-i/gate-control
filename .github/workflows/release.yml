name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="docs/releases/${TAG}.md"

          if [[ -f "${NOTES_FILE}" ]]; then
            echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
            echo "use_generated_notes=false" >> "$GITHUB_OUTPUT"
          else
            echo "notes_file=" >> "$GITHUB_OUTPUT"
            echo "use_generated_notes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release with notes file
        if: steps.meta.outputs.use_generated_notes == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.meta.outputs.notes_file }}
          generate_release_notes: false

      - name: Publish GitHub Release with generated notes
        if: steps.meta.outputs.use_generated_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
